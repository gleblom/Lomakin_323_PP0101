name: Build and Release

on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore
      - name: Build Updater
        run: dotnet publish Updater/Updater.csproj -c Release -r win-x64 --self-contained false -o ./artifacts/updater 

      - name: Build DocumentManagemnetService
        run: dotnet publish DocumentManagemnetService/DocumentManagementService.csproj -c Release -r win-x64 --self-contained false -p:EnableWindowsTargeting=true -o ./artifacts/DocumentManagementService

      - name: Copy Updater into DocumentManagemnetService publish folder
        run: |
          $updater = "artifacts/updater/Updater.exe"
          $dms = "artifacts/DocumentManagementService/"
          Copy-Item $updater -Destination $dms -Force
        shell: pwsh

      - name: Set variables
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if (-not $tag) {
            Write-Error "GITHUB_REF_NAME is empty. This workflow must run on a tag (v*)."
            exit 1
          }

          $version = $tag.TrimStart('v')
          Write-Host "Tag: $tag  Version: $version"

          echo "RELEASE_TAG=$tag" >> $env:GITHUB_ENV
          echo "RELEASE_VERSION=$version" >> $env:GITHUB_ENV
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Zip DocumentManagementService
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $zipName = "Lomakin_323_PP0101-$tag.zip"
          Compress-Archive -Path artifacts/DocumentManagementService/* -DestinationPath "artifacts/$zipName" -Force
          Write-Host "Created zip: artifacts/$zipName"

      - name: List artifacts (debug)
        run: dir artifacts
        shell: pwsh

      - name: Compute SHA256
        id: sha
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $zip = "artifacts/Lomakin_323_PP0101-$tag.zip"
          if (-not (Test-Path $zip)) { Write-Error "ZIP not found: $zip"; exit 1 }
          $sha = Get-FileHash $zip -Algorithm SHA256 | Select -ExpandProperty Hash
          echo "sha=$sha" >> $env:GITHUB_OUTPUT
          Write-Host "SHA256: $sha"

      - name: Create manifest.json
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $version = $env:RELEASE_VERSION
          $repo = "${{ github.repository }}"
          $zipName = "Lomakin_323_PP0101-$tag.zip"
          $url = "https://github.com/$repo/releases/download/$tag/$zipName"
          $manifest = @{
            version = $version
            url = $url
            sha256 = "${{ steps.sha.outputs.sha }}".ToLower()
            notes = "Auto-release $tag"
          } | ConvertTo-Json
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $manifest | Out-File -FilePath artifacts/manifest.json -Encoding utf8
          Write-Host "manifest.json created at artifacts/manifest.json"
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: List artifacts (final check)
        run: dir artifacts
        shell: pwsh

      - name: Verify manifest.json
        run: |
         Get-Content artifacts/manifest.json
         Test-Path artifacts/manifest.json
        shell: pwsh
      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
        files: |
          artifacts/Lomakin_323_PP0101-${{ github.ref_name }}.zip
          artifacts/manifest.json

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/manifest.json
          asset_name: manifest.json
          asset_content_type: application/json

name: Build and Release

on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build DocumentManagemnetService
        run: dotnet publish DocumentManagemnetService/DocumentManagementService.csproj -c Release -r win-x86 --self-contained false -p:EnableWindowsTargeting=true -o ./artifacts/DocumentManagementService

      - name: Set variables
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if (-not $tag) {
            Write-Error "GITHUB_REF_NAME is empty. This workflow must run on a tag (v*)."
            exit 1
          }

          $version = $tag.TrimStart('v')
          Write-Host "Tag: $tag  Version: $version"

          echo "RELEASE_TAG=$tag" >> $env:GITHUB_ENV
          echo "RELEASE_VERSION=$version" >> $env:GITHUB_ENV
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Zip DocumentManagementService
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $zipName = "Lomakin_323_PP0101-$tag.zip"
          Compress-Archive -Path artifacts/DocumentManagementService/* -DestinationPath "artifacts/$zipName" -Force
          Write-Host "Created zip: artifacts/$zipName"

      - name: List artifacts (debug)
        run: dir artifacts
        shell: pwsh

      - name: Compute SHA256
        id: sha
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $zip = "artifacts/Lomakin_323_PP0101-$tag.zip"
          if (-not (Test-Path $zip)) { Write-Error "ZIP not found: $zip"; exit 1 }
          $sha = Get-FileHash $zip -Algorithm SHA256 | Select -ExpandProperty Hash
          echo "sha=$sha" >> $env:GITHUB_OUTPUT
          Write-Host "SHA256: $sha"

      - name: Create manifest.xml
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $version = $env:RELEASE_VERSION
          $repo = "${{ github.repository }}"
          $zipName = "Lomakin_323_PP0101-$tag.zip"
          $url = "https://github.com/$repo/releases/download/$tag/$zipName"
          $sha = "${{ steps.sha.outputs.sha }}".ToLower()
          $notes = "Auto-release $tag"

          $xml = New-Object System.Xml.XmlDocument
          $decl = $xml.CreateXmlDeclaration("1.0", "utf-8", $null)
          $xml.AppendChild($decl) | Out-Null

          $root = $xml.CreateElement("item")
          $xml.AppendChild($root) | Out-Null

          $el = $xml.CreateElement("version")
          $el.InnerText = $version
          $root.AppendChild($el) | Out-Null

          $el = $xml.CreateElement("url")
          $el.InnerText = $url
          $root.AppendChild($el) | Out-Null

          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $xml.Save("artifacts/manifest.xml")
          Write-Host "manifest.xml created at artifacts/manifest.xml"

      - name: List artifacts (final check)
        run: dir artifacts
        shell: pwsh

      - name: Verify manifest.xml
        run: |
         Get-Content artifacts/manifest.xml
         Test-Path artifacts/manifest.xml
        shell: pwsh
      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
          artifacts: "artifacts/Lomakin_323_PP0101-${{ github.ref_name }}.zip, artifacts/manifest.xml"
